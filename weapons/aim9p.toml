# AIM-9P Sidewinder — IR air-to-air missile. Wingtip rails.
#
# After Epic fighters-legacy#583 this is ordnance: it flies, its seeker looks, and its warhead
# applies damage through the full kill chain. The seeker head is now a SENSOR def
# (sensors/aim9p_seeker.toml) referenced by id -- see RFC #676. What stays on the weapon is about
# the SHOT: fire-and-forget doctrine, warhead, and countermeasure susceptibility.
[weapon]
id       = "fl-base:aim9p"
name     = "AIM-9P Sidewinder"
type     = "missile"
category = "air-to-air"

[seeker]
type            = "ir"
sensor_id       = "fl-base:aim9p_seeker"   # the seeker head, defined in sensors/aim9p_seeker.toml
fire_and_forget = true                     # an IR missile does not need the launch aircraft after release
# The pre-#583 ad-hoc lobe (fov_deg / acquisition_nm) is gone: it is mutually exclusive with
# sensor_id, and its acquisition math now lives in the sensor def's [search] lobe.

[performance]
max_range_nm      = 9.0     # [E] kinematic max, head-on. Real employment range is far shorter.
min_range_nm      = 0.3     # [E] arming distance
max_speed_kts     = 1500.0  # [E]
motor_burn_time_s = 5.0     # [E]
max_g             = 20.0    # [E]

[warhead]
blast_radius_ft = 30.0      # [E]
damage          = 60.0      # gameplay value, not a physical one

[countermeasures]
flare_susceptibility = 0.6  # [E] an early rear-aspect IR seeker is genuinely easy to decoy
chaff_susceptibility = 0.0  # immune -- it does not look at radar returns
notch_susceptibility = 0.0

# ── The one store number in this pack that is actually MEASURED ────────────────────────────────
# T.O. 1F-5E-1 publishes max level Mach at 36,000 ft, half internal fuel, BOTH with and without
# wingtip missiles: 1.63 clean, 1.57 with tip missiles. Same altitude, same fuel, same thrust --
# the ONLY difference is two AIM-9s. That is a direct measurement of their drag, and it is the only
# published check on the whole store-drag path (hardpoints -> WeaponLoad -> PayloadEffect).
#
# CALIBRATED AGAINST THE SHIPPING MODEL, not against algebra. `fm-trim --payload` is run on the real
# f5e.toml and drag_factor solved so the aircraft reaches M 1.57 with the pair aboard (mass +172 kg
# is published and not free). At 0.00048 each it lands on 1.57 exactly; clean it makes 1.62 against
# the published 1.63.
#
# THIS NUMBER WAS WRONG ONCE, AND THE WAY IT WAS WRONG IS WORTH KNOWING. It was first derived
# algebraically (0.00105) against the PROVISIONAL parabolic drag polar and thrust deck. When
# [aero.cd_table] replaced that polar, the derivation silently stopped being valid -- the aircraft
# then lost 0.22 Mach to its missiles instead of the published 0.06, and NOTHING CAUGHT IT: every
# validator passed and CI was green, because no gate can express "max Mach with stores" today
# (fighters-legacy#826). It was caught by flying the thing. Calibrate against the model you ship.
[load]
weight_lb   = 190.0     # [P] AIM-9P
drag_factor = 0.00048   # [D] solved against the shipping model to hit the published M 1.57
