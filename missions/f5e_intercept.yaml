#
# f5e_intercept — the pack's first mission: a BFM training engagement, F-5E vs F-5E.
#
# The aggressor framing is deliberate: the same aircraft serves as player mount and adversary,
# which is exactly how the real jet spent its career. It also means the first mission exercises
# the whole vertical slice with ONE asset: flight model, entity def, radar + eyeball sensors,
# the AI script, and the default loadout's mass and drag.
#
# WIN ON THE KILL: Epic fighters-legacy#583 landed the fire path, so the F-5E's gun and AIM-9P are
# real ordnance and the bandit can be shot down. Success is `on: destroy(bandit1)`, evaluated live
# each tick by the mission trigger runtime (engine #632, shipped in v0.3.2).
#
# GROUND START: the player begins PARKED at the surface — idle throttle, zero airspeed, held stable
# until rotation (engine #885). The pack has no terrain yet (#2 cube-sphere tiles, #9 global base),
# so this is the interim sea-level ramp start: the jet sits on the placeholder surface, not a
# runway. When a theater with an airfield lands, the mission moves to the runway proper (#47 stays
# open for that).
#
# MAP: `earth` is the id the terrain issues will ship; validate-mission checks structure, not asset
# existence, so this file is valid today. Same for the placeholder weather layer.

name: "Tiger by the Tail"
map: earth
layer: earth_clear
time: { hour: 9, minute: 30 }
wind: { heading: 250, speed: 6 }
weather:
  preset: partly_cloudy
time_scale: 1.0        # real-time: this is a training engagement, not a campaign transit

sides: [blue, red]

objects:
  # Player: F-5E, combat-configured exactly as the flight model was calibrated —
  # 2x AIM-9 on the tip rails, full 20 mm, clean pylons (the entity def's default loadout).
  #
  # `player: true` makes this a JOINABLE PLAYER SLOT (engine #854): the connecting pilot binds to it
  # and inherits its faction, spawn and aircraft. WITHOUT it, the human gets a default spawn and this
  # object spawns as a world entity — and since it has no `ai:`, the single-player lifecycle (#634)
  # auto-attaches the entity's default fighter.lua, so the intended player jet would fly itself.
  #
  # `start: ground` (engine #885) parks the jet at the surface, and no `alt:` on purpose: a ground
  # start takes its height from the terrain, so an altitude stated here would be a lie.
  - type: fl-base:f5e
    id: player1
    side: blue
    pos: [0, 0, 0]
    heading: 45
    player: true
    start: ground

  # Adversary: same aircraft, AI-flown. No `ai:` on purpose — the #634 auto-detect attaches the
  # entity's own default script (entities/f5e.toml → ai/fighter.lua). It patrols its anchor until its
  # OWN sensors find the player — the APQ-159 cone or the eyeball, whichever gets there first. Nobody
  # in this mission gets ground truth.
  #
  # The bandit stays AIRBORNE: fighter.lua has no takeoff logic, and the #885 parking hold waits for
  # a pilot to rotate. It spawns at cruise airspeed along its heading (the #883 default — no `speed:`
  # needed), so the engagement develops while the player climbs out.
  - type: fl-base:f5e
    id: bandit1
    side: red
    pos: [22000, 0, 18000]
    alt: 4500
    heading: 225

triggers:
  # Win by killing the bandit -- the whole point of a BFM engagement, now that kills are real.
  - on: destroy(bandit1)
    do: mission_success

  # Losing your own aircraft still loses the fight. An UNOCCUPIED slot is not "destroyed"
  # (engine #884), so this cannot fire before a pilot has even joined.
  - on: destroy(player1)
    do: mission_failure
