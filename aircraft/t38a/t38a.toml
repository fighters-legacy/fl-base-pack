# Northrop T-38A Talon — flight model
#
# Same Northrop N-156 airframe family as the F-5E (aircraft/f5e/f5e.toml), forked for the trainer:
# a smaller wing, lower masses, the J85-GE-5 engine, and type = "trainer". Provenance for EVERY
# number is in SOURCES.md, tagged [P] published / [D] derived / [E] estimate.
#
# The lift table, drag table and moment derivatives are generated by derive.py -- do not hand-edit
# them. Re-run `python3 aircraft/t38a/derive.py` and paste, so the derivation stays auditable.
#
# ── THE CALIBRATION INVERTS vs THE F-5E (read derive.py's header) ───────────────────────────────
# The F-5E anchored its drag on a published combat Ps ladder and had no trustworthy climb rate. The
# T-38 is a TRAINER: its T.O. publishes a rate-of-climb, stall speeds and a max Mach, but NO Ps ladder
# and NO turn charts at all. So cd0 is calibrated to the published MIL climb + max Mach; the CL^4
# separation-drag term is INHERITED from the aerodynamically near-identical F-5E (its widest error
# bar); and calibration is checked by fm-trim against t38a.expect.toml.
#
# ── REMAINING PROVISIONAL BLOCKS, so nobody mistakes them for settled ───────────────────
#   [flight_model] ixx/iyy/izz  NO published T-38 inertias exist (confirmed absent from NTRS/DTIC).
#                               Scaled from the F-5E's NASA spin-tunnel values by mass and geometry.
#   [engine.*_thrust]           Thrust vs Mach/alt is NOT published. Installed SL-static anchored on
#                               the J85-GE-5 rating, LEVEL calibrated to the published climb + max
#                               Mach, lapsed by a standard turbojet law. Largest uncertainty.
#   [aero.cd_wave]              Shape is [E]; pinned to reproduce M1.3 at 30,000 ft and M1.08 at SL.
#   cl_p / cl_da                No public T-38 roll-rate data; nothing checks these.

[aircraft]
name        = "T-38A Talon"
type        = "trainer"          # [P] the pack's only trainer -- exercises the trainer plausibility
                                 #     band (fighters-legacy#815): wing loading 207, AR 3.76, both in
engine_type = "turbojet"         # [P] 2x General Electric J85-GE-5, afterburning turbojet
mesh        = "t38a"             # bare stem; FolderContentPack prepends aircraft/
cockpit     = "t38a_cockpit"     # (both keys ignored after engine #813 -- EntityDef owns wiring)
has_fbw     = false              # [P] 1961 airframe. No fly-by-wire, so no G-limiter protection
                                 #     (engine #816). It can be overstressed -- and its g limit is
                                 #     fuel-dependent (see [aero.limits]).
cruise_alt_m = 11000.0

[flight_model]
# Geometry — all [P], DTIC AD0263411 / ADA496748 (Northrop CAD, Table 15).
wing_area_m2 = 15.79             # 170.0 ft^2
wingspan_m   = 7.70              # 25 ft 3 in
mac_m        = 2.356             # 92.76 in
# Mass — [D], see SOURCES.md. Operating empty (the unarmed T-38 carries no ammo or stores); the
# engine adds fuel on top. Wing loading 3270/15.79 = 207 kg/m^2 -- inside the trainer band.
mass_kg      = 3270              # ~7,200 lb operating empty
fuel_kg      = 1770              # ~3,900 lb usable internal (JP-4) [D]
# Moments of inertia — [E]. NO published T-38 inertia source exists (confirmed absent from NTRS and
# DTIC). Scaled from the F-5E's NASA spin-tunnel values (clean, TM SX-3556 Table II) by the mass
# ratio (~12,000/13,000 lb) and the geometry ratio (I ~ m*L^2, span for roll, length for pitch).
# This is a documented estimate, not a measurement -- see SOURCES.md.
ixx_kg_m2    = 3820
iyy_kg_m2    = 44520
izz_kg_m2    = 46950

# ── Lift ───────────────────────────────────────────────────────────────────────────────
# Generated by derive.py. Anchored on ONE published lift point: the [D] 1-g clean stall speed
# (~131 KIAS at 11,800 lb) gives CL_max ~= 1.19 at low Mach. The envelope above is [E] -- a thin
# 4.8% symmetric wing with NO maneuvering flaps (unlike the F-5E), so CL_max is modest and falls
# with Mach. mach axis runs to 1.3, the T-38's placard limit.
[aero.cl_table]
alpha = [-10, -5, 0, 2.5, 5, 7.5, 10, 12.5, 15, 17, 22, 30]
mach  = [0.2, 0.6, 0.9, 1.1, 1.3]
values = [
  -0.6655, -0.7342, -0.8982, -0.7865, -0.7057,   # alpha -10
  -0.3327, -0.3671, -0.4491, -0.5404, -0.3529,   # alpha  -5
   0.0000,  0.0000,  0.0000,  0.0000,  0.0000,   # alpha   0
   0.1664,  0.1835,  0.2246,  0.2702,  0.1764,   # alpha 2.5
   0.3327,  0.3671,  0.4491,  0.5404,  0.3529,   # alpha   5
   0.4991,  0.5506,  0.6737,  0.8106,  0.5293,   # alpha 7.5
   0.6655,  0.7342,  0.8982,  0.7865,  0.7057,   # alpha  10
   0.8319,  0.9177,  0.9522,  0.7121,  0.7008,   # alpha 12.5
   0.9982,  1.1012,  0.8647,  0.6377,  0.6352,   # alpha  15
   1.1313,  1.0962,  0.7947,  0.5782,  0.5827,   # alpha  17  <- peak at M0.20, the anchor
   1.0185,  0.8950,  0.6197,  0.4295,  0.4515,   # alpha  22  <- post-stall collapse
   0.6853,  0.5730,  0.4500,  0.3825,  0.3375,   # alpha  30
]

# ── Drag ───────────────────────────────────────────────────────────────────────────────
# `k = 0` because [aero.cd_table] carries ALL clean drag, induced term included -- authoring both is
# a validator error (it double-counts induced drag). cd0 is superseded by the table; speedbrake and
# gear drag genuinely live here (they add on top of either drag path).
[aero.drag_polar]
cd0           = 0.0180  # [E/D] clean level, calibrated to climb + max Mach. Superseded by cd_table.
k             = 0.0     # MUST be zero: cd_table is total clean drag.
speedbrake_cd = 0.045   # [E] the T-38's ventral speedbrake -- not published
gear_cd       = 0.025   # [E] not published

# ── Tabulated clean drag (engine #820) ─────────────────────────────────────────────────
# Generated by derive.py. cd0 = 0.0180 is the drag LEVEL calibrated so the model reproduces the
# published MIL-thrust climb (SL -> 15,000 ft in 2.0 min) and max level Mach. k1 = 0.0806 is the
# F-5E's induced coefficient scaled by the AR ratio (AR barely moves: 3.75 vs 3.82). k2 = 0.1223 is
# the F-5E's CL^4 SEPARATION term, INHERITED by airframe-family analogy -- there is NO published T-38
# high-CL drag to fit it, and this is the model's widest drag error bar. Separation is keyed to the
# lift fraction CL/CL_max(M); post-stall CD keeps rising while CL collapses. See derive.py.
[aero.cd_table]
alpha = [-10, -5, 0, 2.5, 5, 7.5, 10, 12.5, 15, 17, 22, 30]
mach  = [0.2, 0.6, 0.9, 1.1, 1.3]
values = [
  0.07767, 0.10218, 0.24263, 0.34206, 0.25037,   # alpha -10
  0.02842, 0.03140, 0.04423, 0.08160, 0.04006,   # alpha  -5
  0.01800, 0.01800, 0.01800, 0.01800, 0.01800,   # alpha   0
  0.02032, 0.02087, 0.02269, 0.02639, 0.02126,   # alpha 2.5
  0.02842, 0.03140, 0.04423, 0.08160, 0.04006,   # alpha   5
  0.04566, 0.05531, 0.10509, 0.27379, 0.10141,   # alpha 7.5
  0.07767, 0.10218, 0.24263, 0.34206, 0.25037,   # alpha  10
  0.13234, 0.18531, 0.35792, 0.36617, 0.32591,   # alpha 12.5
  0.21970, 0.32191, 0.38371, 0.39028, 0.34905,   # alpha  15
  0.32145, 0.38463, 0.40434, 0.40957, 0.36757,   # alpha  17
  0.42397, 0.44010, 0.45591, 0.45779, 0.41385,   # alpha  22
  0.51454, 0.52885, 0.53843, 0.53494, 0.48791,   # alpha  30
]

# Transonic wave drag. Entirely [E]: the T-38's only supersonic anchors are max level M1.08 at sea
# level and M1.3 at 30,000 ft. This curve's SHAPE is pinned to reproduce BOTH (low plateau through
# ~M1.1 so SL reaches M1.08, steep rise so altitude caps at M1.3). Do not read confidence into it
# beyond those two points.
[aero.cd_wave]
mach   = [0.85, 0.95, 1.05, 1.10, 1.30, 1.60, 2.00]
values = [0.000, 0.006, 0.010, 0.011, 0.017, 0.024, 0.028]

# ── Moments ────────────────────────────────────────────────────────────────────────────
# Generated by derive.py: USAF DATCOM / Helmbold / strip theory, from the published T-38 geometry.
# NOTHING in t38a.expect.toml constrains these -- no public T-38 source gives a stability derivative
# (the AFFTC S&C report is handling-qualities data, not derivatives). Derived from geometry, sign-
# checked, magnitude-checked against the fighter-family range. Tail moment arms are [E]. These are
# the widest error bars in the model.
[aero.moments]
cm_alpha = -0.939   # [D] statically stable
cm_q     = -6.482   # [D]
cm_de    = -1.364   # [D] all-moving stabilator, so control effectiveness tau = 1.0
cl_beta  = -0.097   # [D]
cl_p     = -0.419   # [D]
cl_da    =  0.044   # [D] no public T-38 roll rate exists to check this
cn_beta  =  0.163   # [D]
cn_r     = -0.362   # [D]
cn_dr    = -0.118   # [D]

[aero.limits]
alpha_stall_deg  = 17.9   # [D] CL_max / CL_alpha at M0.20 = 17.9 deg; matches the cl_table peak.
max_g_structural =  7.33  # [P] T.O. 1T-38A-1 Sec. V -- the LIGHT-weight limit (<=1,600 lb fuel).
                          #     The limit is FUEL-DEPENDENT: +6.0 g full fuel, +7.33 g light. The
                          #     engine takes one value; the airframe genuinely reaches 7.33 g light.
min_g_structural = -3.00  # [P] T.O. Sec. V (light-weight limit; -2.4 g full fuel)
max_mach         =  1.30  # [P] T.O. airframe limit (710 KEAS or M1.3, whichever is less)

# Control throws — [E]. Unlike the F-5E, the T-38 has NO aileron limiter and NO strongly asymmetric
# stabilator, so none of the F-5E's control-surface story is carried over. Actual throws are not in
# a primary source obtained; these are conventional estimates for a stabilator-controlled trainer.
[aero.controls]
max_elevator_deg     = 15.0   # [E] all-moving stabilator, nose-up
max_elevator_neg_deg = 10.0   # [E] nose-down
max_aileron_deg      = 20.0   # [E] full travel -- no aileron limiter on this airframe
max_rudder_deg       = 30.0   # [E] either side of neutral (in-flight deflection is q-limited)

# ── Propulsion ─────────────────────────────────────────────────────────────────────────
# 2x General Electric J85-GE-5. Bare-engine SL static (T.O. 1T-38A-1 Sec. V): military 2,680 lbf =
# 11.92 kN/engine, maximum 3,850 lbf = 17.13 kN/engine. Those are BARE ratings; the INSTALLED thrust
# the aircraft's published performance implies is lower (inlet/nozzle losses), exactly as on the
# F-5E. The deck below is anchored on installed SL static ~18.4 kN MIL / 28.6 kN AB total -- ~9.2 /
# 14.3 kN per engine, near the USAF fact-sheet installed ratings and ~20% below the bare numbers --
# with the LEVEL fixed by the published climb and max Mach (see SOURCES.md). It is the model's
# largest uncertainty.
#
# Fuel flows are [E]: no J85-GE-5-specific fuel-flow data was obtained. Scaled from the F-5E's
# J85-GE-21 flows by the thrust ratio; the AB/MIL ratio (~3.4) is physically sane for a J85.
[engine]
fuel_flow_idle_kg_s = 0.085   # [E] scaled from the F-5E
fuel_flow_mil_kg_s  = 0.570   # [E] scaled by the MIL thrust ratio
fuel_flow_ab_kg_s   = 1.960   # [E] scaled by the AB thrust ratio
spool_time_s        = 3.5     # [E] small-core turbojet, spools fast. Not published.

# Thrust vs Mach and altitude is NOT PUBLISHED. This deck is [D]:
#   T(M, h) = T_sl_static * sigma^0.85 * f(M),   f(M) = 1 - 0.25*M + 0.55*M^2
# a standard turbojet lapse (density lapse x ram recovery), with the SL-static LEVEL calibrated so
# the model reproduces the published 2.0-min MIL climb to 15,000 ft and max level Mach (M1.08 at
# sea level, M1.3 at 30,000 ft). Values in kN, TOTAL (both engines), row-major mach x alt_km.
[engine.mil_thrust]
mach   = [0.2, 0.6, 0.9, 1.2, 1.6]
alt_km = [0.0, 5.0, 11.0, 15.0]
values = [
  17.88, 11.60,  6.37,  4.01,   # M 0.2
  19.28, 12.51,  6.87,  4.33,   # M 0.6
  22.46, 14.57,  8.00,  5.04,   # M 0.9
  27.45, 17.81,  9.78,  6.16,   # M 1.2
  36.95, 23.96, 13.17,  8.29,   # M 1.6
]

[engine.ab_thrust]
mach   = [0.2, 0.6, 0.9, 1.2, 1.6]
alt_km = [0.0, 5.0, 11.0, 15.0]
values = [
  27.80, 18.03,  9.91,  6.24,   # M 0.2
  29.97, 19.44, 10.68,  6.73,   # M 0.6
  34.91, 22.64, 12.44,  7.83,   # M 0.9
  42.67, 27.68, 15.21,  9.58,   # M 1.2
  57.43, 37.25, 20.47, 12.89,   # M 1.6
]
