# Northrop F-5E Tiger II — flight model
#
# Provenance for EVERY number is in SOURCES.md, tagged:
#   [P] published   [D] derived from published values by a stated method   [E] estimate
#
# The lift table and moment derivatives are generated by derive.py -- do not hand-edit them.
# Re-run `python3 aircraft/f5e/derive.py` and paste, so the derivation stays auditable.
#
# Calibration targets live in f5e.expect.toml and are enforced by `fm-trim --expect`
# (engine #817).
#
# ── KNOWN-PROVISIONAL BLOCKS, so nobody mistakes them for settled ──────────────────────
#   [aero.drag_polar]  The parabolic polar CANNOT represent this aircraft. The F-5E's
#                      published Ps ladder shows drag rising 3.5x faster than CL^2 from 1 G
#                      to max lift. `k` below is fitted to the SUSTAINED-TURN point, because
#                      that is the number that defines the jet in a fight; cruise drag is
#                      consequently overstated. Replaced by [aero.cd_table] when engine #820
#                      lands. Do not tune `k` -- fix the schema.
#   [engine.*_thrust]  Thrust vs Mach/altitude is NOT PUBLISHED anywhere. Derived model,
#                      anchored on published SL static thrust. Largest uncertainty here.
#   [engine] fuel flow Pending research; the T.O. gives flow charts, not scalars.
#   [aero.controls]    Deflection limits not yet sourced. Pending research.

[aircraft]
name        = "F-5E Tiger II"
type        = "fighter"          # [P] a light fighter, and honestly so -- not a trainer
engine_type = "turbojet"         # [P] 2x General Electric J85-GE-21, T.O. 1F-5E-1 Sec. I
mesh        = "f5e"              # bare stem; FolderContentPack prepends aircraft/
cockpit     = "f5e_cockpit"      # (both keys are ignored after engine #813 -- EntityDef owns
                                 #  asset wiring. Kept so the file parses before and after.)
has_fbw     = false              # [P] 1972 airframe. No fly-by-wire, and therefore no
                                 #     G-limiter protection (engine #816). It can be overstressed.
cruise_alt_m = 11000.0

[flight_model]
# Geometry — all [P], NASA spin-tunnel report (NTRS 19980227417) Table I.
wing_area_m2 = 17.30             # 186.20 ft^2
wingspan_m   = 8.13              # 26.67 ft, WITHOUT wingtip missiles
mac_m        = 2.456             # 96.68 in
# Mass — [D], see SOURCES.md. Operating empty; the engine adds fuel and stores on top.
mass_kg      = 4832              # 10,650 lb = T.O. typical gross 15,050 lb - full fuel 4,400 lb
fuel_kg      = 1996              # 4,400 lb = 677 gal usable x 6.5 lb/gal JP-4 [P, T.O.]
# Moments of inertia — all [P], NASA Table II, "clean, 55% internal fuel, ammo fired" (13,000 lb),
# the published loading closest to the T.O.'s own turn-chart weight of ~13,530 lb.
# NOTE: NASA's "with missiles" loading has Ixx = 7118 -- 54% higher, because wingtip missiles sit
# far out on the roll axis. The engine cannot vary inertia with stores, so roll acceleration with
# tip missiles will be optimistic. Known limitation, recorded rather than hidden.
ixx_kg_m2    = 4610
iyy_kg_m2    = 52063
izz_kg_m2    = 55317

# ── Lift ───────────────────────────────────────────────────────────────────────────────
# Generated by derive.py. Anchored on the ONE published lift point in existence for this
# aircraft: 5.2 G max lift at 15,000 ft / M 0.60 => CL_max = 1.255 (pure lift; no drag or
# thrust assumption enters). The CL_max-vs-Mach envelope above M 0.6 is [E] -- shock stall
# is real but unquantified for the F-5E.
[aero.cl_table]
alpha = [-10, -5, 0, 5, 10, 15, 17, 22, 30]
mach  = [0.2, 0.6, 0.9, 1.2, 1.6]
values = [
  -0.6710, -0.7412, -0.9103, -0.8448, -0.5004,   # alpha -10
  -0.3355, -0.3706, -0.4552, -0.4224, -0.2502,   # alpha  -5
   0.0000,  0.0000,  0.0000,  0.0000,  0.0000,   # alpha   0
   0.3355,  0.3706,  0.4552,  0.4224,  0.2502,   # alpha   5
   0.6710,  0.7412,  0.9103,  0.8448,  0.5004,   # alpha  10
   1.0065,  1.1118,  0.9877,  0.7031,  0.6752,   # alpha  15
   1.1407,  1.2520,  0.9107,  0.6436,  0.6262,   # alpha  17  <- peak at M0.60, the anchor
   1.0271,  1.0324,  0.7182,  0.4948,  0.5037,   # alpha  22  <- post-stall collapse
   0.6911,  0.6810,  0.4950,  0.3825,  0.3150,   # alpha  30
]

# ── Drag ───────────────────────────────────────────────────────────────────────────────
# `k = 0` because [aero.cd_table] below carries ALL clean drag, induced term included -- that is
# what a tabulated polar means, and authoring both is a validator error (it would double-count
# induced drag: a silent 2x drag bug with no way for an author to debug it).
#
# cd0 here is likewise superseded by the table; it is retained because the schema requires the
# block, and because speedbrake and gear drag genuinely do live here -- they add on top of either
# drag path.
[aero.drag_polar]
cd0           = 0.0200  # [P?] NASA SP-468 -- unverified at source. Superseded by cd_table.
k             = 0.0     # MUST be zero: cd_table is total clean drag. See above.
speedbrake_cd = 0.05    # [E] not published
gear_cd       = 0.025   # [E] not published

# ── Tabulated clean drag (engine #820) ─────────────────────────────────────────────────
# Generated by derive.py. Fitted to the T.O.'s published Ps ladder at 15,000 ft / M 0.60:
#     n  = 1.0, 2.0, 3.3, 4.0, 5.2   ->   Ps = 240, 190, 0, -225, -870 ft/s
#
# The fit is a real measurement, not a tuning: Ps = V*(T-D)/W, and at n = 3.3 the manual says
# Ps = 0, which means D = T EXACTLY. So the ladder pins the shape of CD(CL) with no thrust
# assumption at all -- only the absolute level rides on T, and that is one scalar, not a curve.
# Fit: CD = 0.0200 + 0.0792*CL^2 + 0.1223*CL^4, within 2.9% at all five points.
#
# TWO INDEPENDENT CROSS-CHECKS, both of which could have failed and did not:
#   * The fitted thrust level gives T_ab(15k, M0.60) = 29.19 kN. The thrust deck below -- built
#     from published SL static thrust and a standard turbojet lapse, a different document and a
#     different method -- gives 29.25 kN. 0.2% apart.
#   * The CL^4 term is the whole reason this table exists. At max lift the real jet's drag is ~70%
#     above what the best-fit parabola predicts. No value of `k` could have produced both the
#     sustained turn and the cruise drag; that is what motivated engine #820.
#
# Two corrections beyond the raw fit, both physical:
#   * Separation drag is keyed to the LIFT FRACTION CL/CL_max(M), not to CL. CL_max falls with
#     Mach, so at M0.9 the wing is much nearer its stall at the same CL and its drag is higher.
#   * Past the stall, CD keeps RISING while CL collapses. A naive CD = f(CL) would have drag follow
#     lift back DOWN -- claiming a fully stalled wing is cleaner than one at its lift peak, which
#     would let a departed aircraft accelerate. The post-stall region is [E]; no published F-5E
#     post-stall drag exists. But monotonic-rising is the only defensible shape.
[aero.cd_table]
alpha = [-10, -5, 0, 5, 10, 15, 17, 22, 30]
mach  = [0.2, 0.6, 0.9, 1.2, 1.6]
values = [
  0.08533, 0.10043, 0.22796, 0.37264, 0.11908,   # alpha -10
  0.03077, 0.03319, 0.04531, 0.05264, 0.02991,   # alpha  -5
  0.02000, 0.02000, 0.02000, 0.02000, 0.02000,   # alpha   0
  0.03077, 0.03319, 0.04531, 0.05264, 0.02991,   # alpha   5
  0.08533, 0.10043, 0.22796, 0.37264, 0.11908,   # alpha  10
  0.25043, 0.30482, 0.45599, 0.43710, 0.37327,   # alpha  15
  0.37084, 0.44913, 0.48115, 0.45994, 0.39500,   # alpha  17
  0.49154, 0.51636, 0.54404, 0.51705, 0.44935,   # alpha  22
  0.59655, 0.62393, 0.64468, 0.60841, 0.53629,   # alpha  30
]

# Transonic wave drag. Entirely [E] -- there is exactly ONE supersonic data point in the whole
# published record (max level M 1.63 at 36,000 ft), so this curve's SHAPE is unconstrained.
# Do not read confidence into it above M ~0.9.
[aero.cd_wave]
mach   = [0.85, 0.95, 1.05, 1.20, 1.60, 2.00]
values = [0.000, 0.008, 0.022, 0.020, 0.018, 0.017]

# ── Moments ────────────────────────────────────────────────────────────────────────────
# Generated by derive.py: USAF DATCOM / Helmbold / strip theory, from the NASA geometry.
#
# READ THIS BEFORE TRUSTING THEM. Nothing in f5e.expect.toml constrains these. The published
# turn, Ps and max-speed data test lift, drag and thrust ONLY -- no public F-5E source gives a
# single stability derivative. These are derived from geometry by a standard method, sign-checked,
# and magnitude-checked against the fighter range. They are the widest error bars in this model.
# Two inputs are unpublished estimates (tail moment arms) and one is ambiguous in NASA Table I
# (gross vs exposed tail area, which swings cm_alpha by 75%). Published roll-rate data would
# constrain cl_p and cl_da -- that is an open research item.
[aero.moments]
cm_alpha = -1.013   # [D] statically stable, as the validator requires and the airframe is
cm_q     = -6.058   # [D]
cm_de    = -1.261   # [D] all-moving stabilator, so control effectiveness tau = 1.0
cl_beta  = -0.092   # [D]
cl_p     = -0.418   # [D]
cl_da    =  0.064   # [D] the F-5E is famous for a fast roll; if published roll rate says
                    #     otherwise, THIS is the number to revisit
cn_beta  =  0.144   # [D]
cn_r     = -0.335   # [D]
cn_dr    = -0.110   # [D]

[aero.limits]
alpha_stall_deg  = 17.0   # [D] CL_max / CL_alpha at M 0.60 = 16.9 deg. Matches the cl_table peak,
                          #     which engine #816 will enforce to within +/-2 deg.
max_g_structural =  7.33  # [P] T.O. 1F-5E-1 Sec. V, symmetric, clean / tip-rails
min_g_structural = -3.00  # [P] T.O. 1F-5E-1 Sec. V
max_mach         =  2.00  # [P] T.O. airframe limit: "710 KEAS or 2.0 IMN, whichever is less"

# All [P] — T.O. 1F-5E-1 Section I, pp. 1-79/1-80.
#
# TWO THINGS HERE ARE NOT WHAT YOU WOULD GUESS, and both change how the jet handles:
#
# 1. THE AILERON LIMITER. Full aileron travel is 35 deg up / 25 deg down -- but the manual:
#      "An aileron limiter, mechanically positioned by retraction of the landing gear, provides a
#       spring stop which limits the aileron to ONE-HALF TRAVEL. To obtain full aileron travel of
#       35 up and 25 down, ADDITIONAL STICK FORCE must be applied to override the spring stop."
#    Gear up -- i.e. all combat flight -- normal stick force gives only HALF authority. Section V
#    further lists "continuous 360-degree rolls with more than half aileron" and "exceeding the
#    aileron spring stop except for spin recovery" as STRUCTURAL LIMITS. So the honest value for
#    normal maneuvering is the limited one, not the placard maximum. Authoring 35 here would give
#    the player an F-5E that rolls roughly twice as fast as the real one in every fight.
#
# 2. THE STABILATOR IS ASYMMETRIC: 17 deg nose-up authority, 5 deg nose-down. The schema has ONE
#    scalar per axis and cannot express that, so this is the nose-up figure -- the one that matters
#    for pitch authority and the G limit. Nose-down authority is modelled 3.4x too generous as a
#    result. Engine issue filed. (The manual prints "17 up / 5 down" without stating leading- vs
#    trailing-edge, but the asymmetry settles it: no fighter has 17 deg of nose-DOWN and 5 of
#    nose-up.)
[aero.controls]
max_elevator_deg = 17.0   # [P] all-moving stabilator, nose-up authority (5 deg nose-down)
max_aileron_deg  = 17.5   # [P] HALF of the 35 deg placard travel -- the aileron limiter is engaged
                          #     whenever the gear is up. See above. This is not a typo.
max_rudder_deg   = 30.0   # [P] either side of neutral (in-flight deflection is q-limited)

# ── Propulsion ─────────────────────────────────────────────────────────────────────────
# 2x General Electric J85-GE-21. Sea-level static, INSTALLED (T.O. 1F-5E-1 Sec. I):
#     military  3,250 lbf/engine = 14.46 kN  =>  28.91 kN total
#     maximum   4,650 lbf/engine = 20.68 kN  =>  41.37 kN total
#
# READ THIS: Wikipedia and GE both give 3,500 / 5,000 lbf. Those are BARE-ENGINE ratings. The
# aircraft's published performance charts were computed from the INSTALLED figures above. Using
# the popular number bakes a ~7% thrust error into the entire model while looking well-sourced.
#
# Fuel flows. Total, BOTH engines. Idle and military are PRINTED AS TEXT in the T.O. (chart FA3-1,
# "FUEL FLOW - (2) ENGINES: GROUND TAXI 18 LB/MIN; STATIC MIL THRUST 119 LB/MIN") and repeated in
# the Part 10 mission-planning worked example.
#
# Afterburner is NOT printed anywhere -- the only MAX-thrust fuel data in the manual is chart FA8-1
# (Combat Fuel Allowance), read at sea level / 0.2 IMN, the lowest Mach curve published. That read
# is validated: the same chart's MIL panel reads 121 lb/min against the printed 119 (1.7%), and
# 157 lb/min at 0.8 IMN against the manual's own worked example of 158 (0.6%).
#
# The implied AB/MIL fuel ratio is ~3.0, which is physically sane for a J85 with afterburner --
# and it is the number that makes burner time actually cost the player something.
[engine]
fuel_flow_idle_kg_s = 0.136   # [P]  18 lb/min, ground taxi at idle (57% RPM), SL static
fuel_flow_mil_kg_s  = 0.900   # [P] 119 lb/min, static MIL thrust, SL, standard day
fuel_flow_ab_kg_s   = 2.840   # [D] ~375 lb/min, chart FA8-1 at SL / 0.2 IMN (+/-3%)
spool_time_s        = 3.5     # [E] small-core turbojet, spools fast. Not published.

# Thrust vs Mach and altitude is NOT PUBLISHED -- confirmed, the T.O.'s performance appendix is
# built on a drag-index/fuel-flow method and contains no net-thrust curves. This deck is [D]:
#   T(M, h) = T_sl_static * sigma^0.85 * f(M),   f(M) = 1 - 0.25*M + 0.55*M^2
# a standard turbojet lapse (density lapse x ram recovery), anchored on the published SL static
# thrust and sanity-checked against max level M 1.63 at 36,000 ft. This is the LARGEST source of
# uncertainty in the model. Values in kN, TOTAL (both engines), row-major mach x alt_km.
#
# The high-Mach/low-altitude cells are physically unreachable (the airframe is limited to 710
# KEAS ~ M 1.07 at sea level) and are present only so the table brackets the envelope.
[engine.mil_thrust]
mach   = [0.2, 0.6, 0.9, 1.2, 1.6]
alt_km = [0.0, 5.0, 11.0, 15.0]
values = [
  28.10, 18.23, 10.02,  5.86,   # M 0.2
  30.30, 19.66, 10.80,  6.32,   # M 0.6
  35.28, 22.89, 12.58,  7.36,   # M 0.9
  43.13, 27.98, 15.37,  8.99,   # M 1.2
  58.05, 37.66, 20.69, 12.10,   # M 1.6
]

[engine.ab_thrust]
mach   = [0.2, 0.6, 0.9, 1.2, 1.6]
alt_km = [0.0, 5.0, 11.0, 15.0]
values = [
  40.21, 26.09, 14.33,  8.38,   # M 0.2
  43.36, 28.13, 15.45,  9.04,   # M 0.6
  50.49, 32.76, 17.99, 10.53,   # M 0.9
  61.72, 40.04, 22.00, 12.87,   # M 1.2
  83.07, 53.89, 29.61, 17.32,   # M 1.6
]
