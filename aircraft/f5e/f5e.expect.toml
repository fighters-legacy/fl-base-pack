# F-5E Tiger II — published performance gate.
#
# Consumed by `fm-trim --expect aircraft/f5e/f5e.expect.toml`. This is the mechanised form of
# fighters-legacy#54's Phase-4 acceptance criterion: "flight model stall speed + fuel burn match
# design spec for each aircraft type."
#
# EVERY value is read from a primary source (T.O. 1F-5E-1). Nothing is fitted to make the gate pass
# and nothing comes from a flight simulator. Provenance: SOURCES.md.
#
# ── WHAT THIS GATE CANNOT YET CHECK, AND WHY THAT MATTERS ────────────────────────────────────────
# fm-trim's TrimPoint is {altitude_m, mass_kg}. It has no Mach and no load factor, and its
# `sustained_turn_deg_s` is the turn MAXIMISED OVER SPEED. But every published F-5E turn number is
# at a SPECIFIC Mach (9.9 deg/s at M0.75; 9.1 deg/s at M0.60), and neither is the maximum. There is
# also no Ps metric.
#
# So the four-point Ps ladder -- the single richest drag constraint this aircraft has, the data that
# proved the parabolic polar could not work (engine #820), and the data that [aero.cd_table] is
# FITTED TO -- cannot be expressed as a gate at all. It is checked offline by derive.py instead.
# That is a real hole: the model's most load-bearing calibration is not the one CI protects.
# Filed as an fm-trim follow-up. The full record is kept at the bottom of this file so that when
# fm-trim grows `mach` and `load_factor`, the rows are ready to lift straight in.

[[expect]]
metric     = "stall_speed_1g_mps"
altitude_m = 0.0
mass_kg    = 6123           # 13,500 lb, clean (0/0 flaps, gear up), 15% MAC
expected   = 67.39          # 131 KIAS
tolerance  = 2.1            # m/s -- the nomogram trace is +/-3 KIAS
# T.O. 1F-5E-1 Fig. 6-1 (stall-speed nomogram; basis: flight test, idle thrust), traced.
# Cross-validated three ways: back-solved CL_max is constant at 1.253/1.248/1.255 across three
# gross weights (Vs ~ sqrt(W) falls OUT of the trace, it was not imposed); it agrees with the
# CL_max = 1.255 derived independently from the max-lift TURN point, a different chart at a
# different condition, to 0.4%; and the manual's separate landing chart gives approach ~= 1.28 Vs.

[[expect]]
metric     = "stall_speed_1g_mps"
altitude_m = 0.0
mass_kg    = 4990           # 11,000 lb, clean, 15% MAC
expected   = 60.70          # 118 KIAS
tolerance  = 2.1
# Two weights deliberately, not one: together they test that the model gets Vs ~ sqrt(W) right,
# rather than hitting a single number by luck.

[[expect]]
metric      = "max_level_mach"
altitude_m  = 10973.0       # 36,000 ft
mass_kg     = 5829          # clean, "launcher rails only, no pylons", 1/2 internal fuel
afterburner = true
expected    = 1.63
tolerance   = 0.05
# T.O. 1F-5E-1, "Effect of Pylons on Combat Performance". The ONLY supersonic data point in the
# entire published record -- which is why cd_wave's shape above M ~0.9 is an estimate and should
# not be trusted beyond this one anchor.

# ─────────────────────────────────────────────────────────────────────────────────────────────────
# HELD BACK, awaiting an fm-trim that can express them. NOT deleted: these are the strongest
# numbers we have, and losing them from the record would be worse than losing them from the gate.
#
# Ps ladder — 15,000 ft, M 0.60, max thrust, 6137 kg (2x AIM-9 + full ammo + 1/2 fuel).
# This is what [aero.cd_table] is fitted to (see derive.py); it needs `mach` + `load_factor` + a
# `ps_mps` metric.
#     load factor 1.0  ->  Ps = +240 ft/s
#     load factor 2.0  ->  Ps = +190 ft/s
#     load factor 3.3  ->  Ps =    0 ft/s   (sustained -- and D = T exactly here, which is what
#                                            lets the ladder pin CD(CL) with no thrust assumption)
#     load factor 4.0  ->  Ps = -225 ft/s
#     load factor 5.2  ->  Ps = -870 ft/s   (max lift -- this point pins CL_max = 1.255)
#
# Turn performance at a SPECIFIED Mach — needs `mach`.
#     15,000 ft, M 0.75:  sustained 4.3 G / 9.9 deg/s / radius 4,700 ft
#                         instantaneous at the 7.33 G limit: 17 deg/s / radius 2,700 ft
#     15,000 ft, M 0.60:  sustained 3.3 G / 9.1 deg/s;  max lift 5.2 G / 14.8 deg/s
#
# Max level Mach with tip missiles — needs `stores` (or a --payload the gate can vary per row).
#     36,000 ft, 2x AIM-9: M 1.57 (vs 1.63 clean). This is the ONLY published check on whether the
#     store-drag path (hardpoints -> WeaponLoad.drag_factor -> PayloadEffect) is calibrated, and it
#     is where weapons/aim9p.toml's drag_factor = 0.00105 comes from.
#
# Structural limits — published outright, no trim needed: +7.33 / -3.0 G (clean / tip rails).
#
# ── NOT PUBLISHED AT ALL, so deliberately absent ────────────────────────────────────────────────
# roll_rate       -- confirmed absent from the full T.O. chart inventory AND the whole NTRS F-5E
#                    corpus. cl_p and cl_da are the only numbers in the model with nothing to check
#                    them against. Figures circulating online trace to no primary source.
# roc_sl          -- Wikipedia/Jane's say 34,500 ft/min. Not physically consistent with 9,300 lbf
#                    of installed thrust at ~13,500 lb; almost certainly a zoom or peak-Ps figure.
#                    DO NOT gate on it. The Ps ladder is the honest climb constraint.
# specific_range  -- the T.O. has cruise charts only; no number is printed.
# corner_speed    -- the T.O. defines and plots it but prints no numeric value.
