# Northrop T-38A Talon — entity definition.
#
# THE PACK'S ONE UNARMED AIRCRAFT. No hardpoints, no gun, no radar. This entity is the proof that an
# unarmed airframe is a first-class citizen: it must load and fly with no crash, no warning spam, and
# NO implicit builtin-radar fallback (fl-base-pack#20). Nothing else in the pack exercises that path.
#
# EntityDef owns all asset wiring (engine #813). `mesh`/`cockpit`/`flight_model` are ASSET NAMES, and
# FolderContentPack prepends the TYPE's directory (`aircraft/`) but NOT the asset's own subdirectory,
# so an asset at aircraft/t38a/t38a.toml is named "t38a/t38a", not "t38a". (Writing the bare stem
# "t38a" resolved to aircraft/t38a.toml, which does not exist, and the server silently flew the
# builtin flight model — the F-5E's "UFO" war story. Write the subdirectory.)
#
# By contrast `sensors` are DEF IDS — namespaced, never filenames; the engine maps id -> asset name
# once at bootstrap (engine #810). The two vocabularies are not interchangeable.

[entity]
id           = "fl-base:t38a"
name         = "T-38A Talon"
category     = "air_vehicle"
max_hp       = 100.0
# collision_radius_m intentionally omitted: the air-vehicle default is 8 m, which comfortably covers
# the T-38's 7.7 m span. An explicit value would only be needed to override it for a larger airframe.
mesh         = "t38a/t38a"          # -> aircraft/t38a/t38a.glb
cockpit      = "t38a/t38a_cockpit"  # -> aircraft/t38a/t38a_cockpit.glb  (engine #813)
flight_model = "t38a/t38a"          # -> aircraft/t38a/t38a.toml
ai_script    = "trainer"        # -> ai/trainer.lua (basic flight; NO weapon employment)

# ONE sensor, and only the day eyeball. The T-38A has no radar (fl-base-pack#20 is explicit), so it
# hunts — or rather navigates — by Mark One Eyeball alone. This is deliberately more minimal than the
# F-5E, which also carries eyeball_night; the single sensor is the point of the proof case. Honest
# sensing (Epic #670) means an AI T-38 sees only what this one sensor gives it, and nothing else.
sensors = ["fl-base:eyeball_day"]

# ── Signatures ──────────────────────────────────────────────────────────────────────────────────
# Unitless multipliers against a baseline fighter (1.0). Sensor max_range scales by sqrt(rcs) for
# radar and LINEARLY for ir/visual/laser.
#
# All [E]. No T-38 signature data is public. But the estimate is not arbitrary: the T-38 is one of
# the smallest, cleanest jets ever fielded — 14 m long, 7.7 m span, no wingtip rails and no external
# stores of any kind. Its signatures should sit at or below the F-5E's (0.55/0.75/0.55), which is
# itself a physically tiny airframe: the T-38 is cleaner (no rails), its J85-GE-5 engines are smaller
# and less often in burner than the F-5E's -21s, and it is famously hard to see.
#
# NOTE ON `visual`: the real T-38 usually wears high-visibility white/USAF trainer markings, which
# would RAISE its visual signature. The pack ships a generic clean grey (policy §4, no liveries), so
# the estimate reflects the grey aircraft actually modelled, not the white one — recorded so the
# choice is visible rather than silent.
[signatures]
rcs    = 0.50   # [E] tiny and clean, no rails or stores — a touch below the F-5E
ir     = 0.65   # [E] smaller J85-GE-5s, rarely in burner
visual = 0.55   # [E] very small and hard to see (grey, not the real high-vis white — see above)
laser  = 1.0    # [E] no basis to deviate from baseline

[ai]
skill    = 0.4  # a trainer, flown for the syllabus — not the F-5E aggressor's 0.6
reaction = 0.4

# ── Hardpoints ──────────────────────────────────────────────────────────────────────────────────
# THERE ARE NONE. The T-38A is unarmed: no gun, no pylons, no wingtip rails. This block is
# deliberately absent (not empty-with-comments) — the entity carries zero [[hardpoints]] tables, and
# the engine must accept that without warning or a builtin fallback. That absence is the whole point
# of this aircraft in the pack.

# ── Damage ──────────────────────────────────────────────────────────────────────────────────────
# Gameplay values, not physical ones. The three tiers mirror the F-5E's, MINUS avionics: there is no
# radar to lose, so `avionics_failure` is omitted (defaults false) and there is no avionics subsystem
# pool. Losing the eyeball is not an avionics failure — it is the pilot, and the pilot is the entity.
[damage.light]
hp_fraction    = 0.70
visual_effect  = "smoke_light"
thrust_factor  = 0.95
control_factor = 1.0

[damage.heavy]
hp_fraction    = 0.35
visual_effect  = "smoke_heavy"
thrust_factor  = 0.70
control_factor = 0.80

[damage.critical]
hp_fraction    = 0.10
visual_effect  = "fire"
thrust_factor  = 0.35
control_factor = 0.50
# no avionics_failure: the T-38 has no radar/avionics suite to strip. See header.

# ── Per-subsystem damage (engine #675) ────────────────────────────────────────────────────────────
# Additive granularity on top of the tiers above. The twin J85 is the marquee, exactly as on the
# F-5E: engine_left / engine_right are separate pools, and losing ONE is the asymmetric engine-out —
# half thrust plus a yaw moment toward the dead engine. With no G limiter and no FBW, that is a
# genuine handful, which is the point. NO avionics pool (no radar to hit).
[damage.subsystems.engine_left]
hp     = 40.0
weight = 2.0

[damage.subsystems.engine_right]
hp     = 40.0
weight = 2.0

[damage.subsystems.controls]
hp     = 25.0
weight = 1.5

[damage.subsystems.fuel]
hp     = 50.0
weight = 1.2

# NB: no [classic] block. The T-38's battle-damage geometry is the `t38a_b` NODE inside
# aircraft/t38a/t38a.glb (built by fl_meshlib/damage.py); the render path swaps to it. A separate
# JumpToDamage classic-mode .glb is optional and this pack does not ship one.
