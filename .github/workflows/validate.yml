name: Validate Assets

on:
  pull_request:
    branches: [main]

jobs:
  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: fsfe/reuse-action@v4

  asset-naming:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check asset naming conventions
        shell: bash
        run: |
          set -euo pipefail
          FAIL=0

          # No spaces in filenames
          if find aircraft entities sensors weapons terrain missions audio ai -name "* *" 2>/dev/null | grep -q .; then
            echo "ERROR: filenames with spaces:"
            find aircraft entities sensors weapons terrain missions audio ai -name "* *"
            FAIL=1
          fi

          # Asset filenames must be lowercase (Linux ext4 is case-sensitive, and the engine
          # lowercases asset names before resolving them, so an uppercase asset silently misses).
          #
          # DOCUMENTATION IS NOT AN ASSET. `SOURCES.md` is REQUIRED in every aircraft directory by
          # docs/legal/aircraft-likeness.md — it is the provenance manifest that makes the whole
          # policy auditable — and it is uppercase by the same convention as README.md and LICENSE.
          # The engine never loads it. Policing its case would fail every conforming aircraft PR.
          if find aircraft entities sensors weapons terrain missions audio ai -name "*[A-Z]*" ! -name "*.md" 2>/dev/null | grep -q .; then
            echo "ERROR: uppercase asset filenames (Linux ext4 is case-sensitive):"
            find aircraft entities sensors weapons terrain missions audio ai -name "*[A-Z]*" ! -name "*.md"
            FAIL=1
          fi

          # No Windows reserved name stems (cause hangs/errors on Windows)
          while IFS= read -r f; do
            stem=$(basename "$f" | sed 's/\.[^.]*$//')
            if echo "$stem" | grep -iqE '^(con|nul|prn|aux|com[1-9]|lpt[1-9])$'; then
              echo "ERROR: Windows reserved filename: $f"
              FAIL=1
            fi
          done < <(find aircraft entities sensors weapons terrain missions audio ai -type f 2>/dev/null)

          # OGG files only under audio/
          if find . -name "*.ogg" -not -path "./audio/*" 2>/dev/null | grep -q .; then
            echo "ERROR: .ogg files outside audio/:"
            find . -name "*.ogg" -not -path "./audio/*"
            FAIL=1
          fi

          # Lua files only under ai/
          if find . -name "*.lua" -not -path "./ai/*" 2>/dev/null | grep -q .; then
            echo "ERROR: .lua files outside ai/:"
            find . -name "*.lua" -not -path "./ai/*"
            FAIL=1
          fi

          # Backslash path separators in TOML (Windows paths appear as \\ in source)
          if find aircraft terrain missions -name "*.toml" 2>/dev/null | \
              xargs grep -lP '\\\\[A-Za-z0-9_-]' 2>/dev/null | grep -q .; then
            echo "ERROR: backslash path separators in TOML (use forward slashes):"
            find aircraft terrain missions -name "*.toml" | \
              xargs grep -nP '\\\\[A-Za-z0-9_-]'
            FAIL=1
          fi

          # Backslash path separators in YAML
          if find missions -name "*.yaml" 2>/dev/null | \
              xargs grep -lP '\\[A-Za-z0-9_-]' 2>/dev/null | grep -q .; then
            echo "ERROR: backslash path separators in YAML (use forward slashes):"
            find missions -name "*.yaml" | \
              xargs grep -nP '\\[A-Za-z0-9_-]'
            FAIL=1
          fi

          # Aircraft directory layout: <name>.glb must pair with <name>.toml
          for dir in aircraft/*/; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            if [ -f "${dir}${name}.glb" ] && [ ! -f "${dir}${name}.toml" ]; then
              echo "ERROR: ${dir}${name}.glb has no matching .toml"
              FAIL=1
            fi
          done

          [ $FAIL -eq 0 ] && echo "All naming checks passed."
          exit $FAIL

  flight-model-validate:
    runs-on: ubuntu-latest
    # SOFT, ON PURPOSE, AND NOT FOR LONG. The validator in the latest engine release (v0.3.1)
    # predates fighters-legacy#823, which taught it that `aero.drag_polar.k = 0.0` is not merely
    # legal but REQUIRED of an aircraft that authors a `cd_table`: the table is TOTAL clean drag,
    # so a non-zero k would double-count the induced term. The F-5E is exactly such an aircraft,
    # and v0.3.1's validator therefore rejects our only aeroplane for being correct. Engine main
    # already has the fix.
    #
    # When an engine release ships a post-#823 validate-flight-model: delete this line and add
    # `flight-model-validate` to the branch protection required checks. That is all that is left
    # of #7 for this job.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Find changed flight models
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          # A `*.expect.toml` sits beside the flight model it describes and states the performance
          # that model must reproduce. It is a test fixture, not a flight model: it has no
          # [flight_model] table and the validator rejects it on sight. The obvious
          # `aircraft/**/*.toml` glob sweeps it in and would fail every aircraft PR on a file that
          # is doing its job.
          FILES=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- aircraft \
            | { grep -E '\.toml$' || true; } \
            | { grep -v -E '\.expect\.toml$' || true; } \
            | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Flight models to validate: ${FILES:-(none)}"
      - name: Fetch validators
        if: steps.changed.outputs.files != ''
        uses: ./.github/actions/engine-validators
        with:
          require: validate-flight-model
      - name: Run flight model validator
        if: steps.changed.outputs.files != ''
        run: validate-flight-model ${{ steps.changed.outputs.files }}

  # fm-trim --expect: the Phase-4 gate from #1/#54, mechanised. Where validate-flight-model checks a
  # model is well-formed, fm-trim derives its performance and fails when it stops reproducing the
  # numbers its flight manual publishes (stall speed, max Mach, ROC, sustained turn, fuel burn). It
  # runs each changed model against its sibling `<name>.expect.toml`. Auto-activating like the other
  # #583/#829 legs: fm-trim (#817) may predate the pinned engine release, so the fetch skips green
  # (optional) until a release ships it, then gates for real -- see the engine-validators action.
  fm-trim-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Find changed flight models
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          # Same glob as flight-model-validate: aircraft TOMLs, minus the *.expect.toml fixtures
          # (which have no [flight_model] table and are the expectation input, not a model).
          FILES=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- aircraft \
            | { grep -E '\.toml$' || true; } \
            | { grep -v -E '\.expect\.toml$' || true; } \
            | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Flight models to fm-trim: ${FILES:-(none)}"
      - name: Fetch fm-trim (skip if the engine release predates it)
        id: fetch
        if: steps.changed.outputs.files != ''
        uses: ./.github/actions/engine-validators
        with:
          require: fm-trim
          optional: "true"
      - name: Run fm-trim --expect
        if: steps.fetch.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          rc=0
          for model in ${{ steps.changed.outputs.files }}; do
            expect="${model%.toml}.expect.toml"
            if [ -f "$expect" ]; then
              echo "fm-trim $model --expect $expect"
              fm-trim "$model" --expect "$expect" || rc=1
            else
              echo "note: $model has no $expect — skipping its performance check"
            fi
          done
          exit $rc

  mesh-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Find changed meshes
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          # `<id>_cockpit.glb` is EXCLUDED, and that is not a convenience -- it is a real conflict
          # between three sources of truth, recorded here so nobody "fixes" it by deleting this
          # filter:
          #
          #   - docs/modding/3d-models.md says a cockpit file carries `camera_anchor` AND the
          #     instrument panel geometry;
          #   - the engine renders no cockpit interior at all today, so ours is a camera-anchor
          #     empty and nothing else;
          #   - validate-mesh rejects any file with no meshes ("no meshes found"), so it rejects
          #     the very file the engine's own convention asks us to ship.
          #
          # Filed as fighters-legacy#844. When the validator learns the camera-anchor convention,
          # drop this filter.
          #
          # LOD siblings are not listed either: validate-mesh discovers and validates them itself
          # from the base mesh, so naming them would only validate them twice.
          FILES=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- aircraft \
            | { grep -E '\.glb$' || true; } \
            | { grep -v -E '_cockpit\.glb$' || true; } \
            | { grep -v -E '_lod[0-9]+\.glb$' || true; } \
            | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Meshes to validate: ${FILES:-(none)}"
      - name: Fetch validators
        if: steps.changed.outputs.files != ''
        uses: ./.github/actions/engine-validators
        with:
          require: validate-mesh
      - name: Run mesh validator
        if: steps.changed.outputs.files != ''
        run: validate-mesh ${{ steps.changed.outputs.files }}

  mission-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Find changed missions
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          FILES=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- missions \
            | { grep -E '\.ya?ml$' || true; } \
            | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Missions to validate: ${FILES:-(none)}"
      - name: Fetch validators
        if: steps.changed.outputs.files != ''
        uses: ./.github/actions/engine-validators
        with:
          require: validate-mission
      - name: Run mission validator
        if: steps.changed.outputs.files != ''
        run: validate-mission ${{ steps.changed.outputs.files }}

  # ── Weapons / sensors / entity legs (engine #583). ─────────────────────────────────────────────
  # AUTO-ACTIVATING, not continue-on-error. The engine-validators action pulls from the LATEST
  # engine RELEASE, and the current one (v0.3.1) predates the #583 weapons/damage merge -- it ships
  # validate-flight-model/mesh/mission but NOT validate-entity/weapon/sensor. So each leg asks the
  # action for its validator with `optional: true`: if the release lacks it, the fetch SKIPS green
  # (available=false) and the run step is gated off; the moment a post-#583 release includes the
  # binary, `available` flips to true and the leg becomes a real gate with no edit here. This is
  # why the pack is validated against a LOCAL post-#583 engine build in the meantime -- and it is
  # NOT the "|| true" soft landing the action exists to kill: a validator that IS present runs, and
  # a real validation error still fails the job.
  #
  # Because these are honest green today (a skip is a pass) and gate for real later, they can be
  # added to the branch-protection required checks now.
  #
  # validate-entity/validate-weapon run in `--pack` mode (they cross-check references across the
  # whole pack: hardpoint weapon ids, seeker sensor_id, every asset name), so they take the pack
  # root, not a changed-file list. A change anywhere in the pack's asset dirs triggers a re-run.
  entity-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect pack asset changes
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          # validate-entity --pack resolves mesh/cockpit/flight_model/ai_script/damage_mesh/manual
          # asset names AND sensor/weapon def ids, so any of these dirs changing warrants a re-run.
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" \
            -- entities sensors weapons aircraft ai | tr '\n' ' ')
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "Pack asset changes: ${CHANGED:-(none)}"
      - name: Fetch validator (skip if the engine release predates it)
        id: fetch
        if: steps.changed.outputs.changed != ''
        uses: ./.github/actions/engine-validators
        with:
          require: validate-entity
          optional: "true"
      - name: Run entity validator (whole pack)
        if: steps.fetch.outputs.available == 'true'
        run: validate-entity --pack .

  weapon-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect weapon/sensor changes
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          # --pack cross-checks each seeker.sensor_id against the pack's sensor defs, so a sensor
          # change can invalidate a weapon and vice versa: watch both dirs.
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" \
            -- weapons sensors | tr '\n' ' ')
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "Weapon/sensor changes: ${CHANGED:-(none)}"
      - name: Fetch validator (skip if the engine release predates it)
        id: fetch
        if: steps.changed.outputs.changed != ''
        uses: ./.github/actions/engine-validators
        with:
          require: validate-weapon
          optional: "true"
      - name: Run weapon validator (whole pack)
        if: steps.fetch.outputs.available == 'true'
        run: validate-weapon --pack .

  sensor-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Find changed sensors
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          # validate-sensor has no --pack mode; it validates each file, so pass the changed list.
          FILES=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- sensors \
            | { grep -E '\.toml$' || true; } \
            | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Sensors to validate: ${FILES:-(none)}"
      - name: Fetch validator (skip if the engine release predates it)
        id: fetch
        if: steps.changed.outputs.files != ''
        uses: ./.github/actions/engine-validators
        with:
          require: validate-sensor
          optional: "true"
      - name: Run sensor validator
        if: steps.fetch.outputs.available == 'true'
        run: validate-sensor ${{ steps.changed.outputs.files }}
